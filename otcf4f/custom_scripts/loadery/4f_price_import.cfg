[std_cmd_args]
std_cmd_args = container_name, storage_account_key, storage_account_name, dict_version_file, process_instance_id

[spark_config]
# Parametry Spark zarzadzane przez apply_profile() w skrypcie .py (lib/spark_profiles.py)

[input]
# Kontener 'data'
raw_store = DATA_IN/SKLEPY/store.csv
raw_price_base = DATA_IN/CENNIKI/price.csv
raw_price_retail = DATA_IN/CENNIKI/retail_price.csv

# Kontener 'bigdata'
product_dict = dictionaries/product
price_dict = dictionaries/price

[business]
# Minimalna data cennika (włącznie). Puste = brak filtra (pełna historia).
# UWAGA: Dane źródłowe to snapshot (1 cena per produkt), nie historia.
# Filtrowanie odcina produkty ze starszą ceną — zmniejsza pokrycie asortymentu.
# min_date = 2023-01-01

[output]
out_full = /TRANSFORMED_DATA/CENNIKI
out_sample = /TRANSFORMED_DATA/CENNIKI/price_SAMPLE

[logging]
log_on_the_screen = true