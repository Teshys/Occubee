[spark_config]
# Parametry Spark zarzadzane przez apply_profile() w skrypcie .py (lib/spark_profiles.py)

[input]
# Folder z plikami sprzedażowymi (bez wildcarda — wybór pliku przez FILE_MODE w skrypcie)
